server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve the SPA without looping
  location = /        { try_files /index.html =404; }
  location = /index.html {}

  # (Enable later if you want SPA fallback)
  # location / { try_files $uri $uri/ /index.html; }

  # AYON health ping
  location = /api {
    default_type application/json;
    return 200 '{"api":"Zou","note":"use /api/ for endpoints"}';
  }

  # --- API proxy: backend has NO /api prefix ---
  # /api/auth/login          -> http://zou-api:8000/auth/login
  # /api/auth/authenticated  -> http://zou-api:8000/auth/authenticated
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward the bearer token
    proxy_set_header Authorization     $http_authorization;

    # Strip /api before proxying
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://zou-api:8000/;
  }

  # Websocket/event stream used by Kitsu/Zou
  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_pass http://zou-api:8000/socket.io/;
  }
}
